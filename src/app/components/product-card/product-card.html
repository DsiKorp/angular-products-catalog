<div class="card bg-base-100 shadow-md hover:shadow-lg transition-shadow">
  <figure class="px-4 pt-4">
    <div class="w-full h-48 bg-gray-200 rounded-lg overflow-hidden">
      <img
        [src]="product.images[0]"
        [alt]="product.title"
        class="w-full h-full object-cover hover:scale-105 transition-transform duration-300"
      />
    </div>
  </figure>
  <div class="card-body">
    <h2 class="card-title text-lg line-clamp-2">{{ product.title }}</h2>
    <p class="text-sm text-gray-600">{{ product.category }}</p>
    
    <div class="flex justify-between items-center my-2">
      <span class="text-2xl font-bold text-primary">${{ product.price.toFixed(2) }}</span>
      <div class="badge badge-secondary">{{ product.rating }}⭐</div>
    </div>

    <div class="flex items-center gap-2">
      <span class="text-sm">Stock: </span>
      <span [class]="product.stock > 0 ? 'badge badge-success' : 'badge badge-error'">
        {{ product.stock > 0 ? product.stock + ' available' : 'Out of stock' }}
      </span>
    </div>

    <div class="card-actions justify-between mt-4">
      <button
        routerLink="/product/{{ product.id }}"
        class="btn btn-outline btn-sm"
      >
        View Details
      </button>
      <button
        (click)="addToCart()"
        [disabled]="product.stock === 0"
        class="btn btn-primary btn-sm"
      >
        Add to Cart
      </button>
    </div>
  </div>
</div>
