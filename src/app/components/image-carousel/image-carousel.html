<div class="carousel w-full rounded-lg overflow-hidden shadow-lg">
  <div
    *ngFor="let image of images; let i = index"
    [id]="'carousel-item-' + i"
    class="carousel-item w-full"
    [class.hidden]="currentIndex() !== i"
  >
    <img [src]="image" [alt]="'Product image ' + (i + 1)" class="w-full h-96 object-cover" />
  </div>
</div>
<div class="flex justify-center gap-2 mt-4">
  <button
    (click)="previousImage()"
    class="btn btn-sm"
    [disabled]="images.length <= 1"
  >
    ❮
  </button>
  <div class="flex gap-1">
    <button
      *ngFor="let image of images; let i = index"
      (click)="goToImage(i)"
      class="btn btn-xs"
      [class.btn-primary]="currentIndex() === i"
      [class.btn-outline]="currentIndex() !== i"
    >
      {{ i + 1 }}
    </button>
  </div>
  <button
    (click)="nextImage()"
    class="btn btn-sm"
    [disabled]="images.length <= 1"
  >
    ❯
  </button>
</div>
